<input type="text" placeholder="Search..." [(ngModel)]="searchQuery" (ngModelChange)="onSearch()" />

<table>
  <thead>
    <tr>
      <th *ngFor="let column of columns">{{ column.label }}</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let data of visibleDataList">
      <td *ngFor="let col of columns">
        <ng-container *ngIf="cellTemplates.get(col.key) as cellTpl else defaultCell">
          <ng-container *ngTemplateOutlet="cellTpl, context: {$implicit: data[col.key]}" />
        </ng-container>
        <ng-template #defaultCell>{{data[col.key]}}</ng-template>
      </td>
    </tr>
  </tbody>
</table>
